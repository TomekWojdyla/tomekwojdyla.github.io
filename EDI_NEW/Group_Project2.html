<!DOCTYPE html>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
<link rel="stylesheet" href="group_project_style.css">

<html>
    <head>
        <title>Group Project</title>
    </head>
    <body>         
        <h1>Group members</h1>
        <p>Anna Kornaga</p>
        <P>Łukasz Malec</p>
        <p>Tomasz Wojdyła</p>
        <hr>
        <h1>Imported data</h1>
        <button class ="btn btn-warning" onclick = "loadVolleyJSON()">Download the data about Volleyball Players</button><br>
        <hr>
        <button onclick = "testdisp()" ondblclick="testdisp2()">test scripts</button>    

        <p id ="desc" style="visibility:hidden">This text is to check script</p>


        <hr>
        <h1>Test JSON table</h1>
        <button class ="btn btn-success" onclick = "loadVolleyJSON()">Log to console</button><br>
        <div id="myData"></div>

        <script>
            function loadVolleyJSON() {
                fetch("https://my.api.mockaroo.com/volleyballplayers.json?key=c097ba40")
                    .then(function (response) {
                        return response.json();
                    })
                    .then(function (data) {
                        appendData(data);
                        console.log(data);
                    })
                    .catch(function (err) {
                        console.log('error: ' + err);
                    });
                function appendData(data) {
                    var mainContainer = document.getElementById("myData");
                        for (var i = 0; i < data.length; i++) {
                            var div = document.createElement("div");
                            div.innerHTML = 'Player: ' + data[i].first_name +" "+data[i].last_name
                            mainContainer.appendChild(div);
                    }
                }
            }




            function testdisp() {
                document.getElementById("desc").style.visibility = "visible"               
            }

            function testdisp2() {
                document.getElementById("desc").style.visibility = "hidden"               
            }


        </script>    
    </body>
</html>
